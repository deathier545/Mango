name: CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - run: python -m pytest tests -q
      - run: python -m ruff check mango tests

  ui:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: mango-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build
      - run: npm run lint
