name: tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  pytest:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-pinned.txt
          pip install -r requirements-dev.txt

      - name: Ruff
        shell: pwsh
        run: python -m ruff check mango tests

      - name: Mypy (strict core modules)
        shell: pwsh
        run: python -m mypy mango/config.py mango/tool_registry.py mango/main.py --follow-imports=skip

      - name: Run tests
        shell: pwsh
        run: python -m pytest tests -q
