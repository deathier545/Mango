[mypy]
python_version = 3.11
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_return_any = False
disallow_untyped_defs = False
ignore_missing_imports = True
pretty = True

[mypy-mango.config]
disallow_untyped_defs = True

[mypy-mango.config_build]
disallow_untyped_defs = True

[mypy-mango.config_env]
disallow_untyped_defs = True

[mypy-mango.tool_registry]
disallow_untyped_defs = True

[mypy-mango.main]
disallow_untyped_defs = True

[mypy-mango.voice_loop]
disallow_untyped_defs = True

[mypy-mango.wake.wake_listener]
disallow_untyped_defs = True
